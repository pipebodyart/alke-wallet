<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión · Alke Wallet</title>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="css/styles.css" rel="stylesheet" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card fade-in">
      <div class="auth-logo">Alke<span>Wallet</span></div>
      <p class="text-center text-muted mb-4">Tu billetera digital, segura y simple</p>

      <!-- Mensaje de error -->
      <div id="loginError" class="alert alert-danger d-none" role="alert"></div>

      <form id="loginForm" novalidate>
        <div class="mb-3">
          <label for="email" class="form-label">Correo electrónico</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control" id="email" placeholder="usuario@alke.com" required />
          </div>
          <div class="invalid-feedback">Ingresa un correo válido.</div>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="password" placeholder="••••••••" required />
            <button class="btn btn-outline-secondary" type="button" id="togglePass" tabindex="-1">
              <i class="bi bi-eye"></i>
            </button>
          </div>
          <div class="invalid-feedback">La contraseña es obligatoria.</div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="remember" />
            <label class="form-check-label" for="remember">Recordarme</label>
          </div>
          <a href="#" class="text-decoration-none" style="color: var(--primary);">¿Olvidaste tu clave?</a>
        </div>

        <button type="submit" class="btn btn-alke w-100 mb-3">Iniciar sesión</button>
      </form>

      <div class="alert alert-light border small mb-0">
        <strong>Credenciales de prueba:</strong><br />
        Correo: <code>usuario@alke.com</code><br />
        Clave: <code>alke1234</code>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
