<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Depositar · Alke Wallet</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="css/styles.css" rel="stylesheet" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark navbar-alke">
    <div class="container">
      <a class="navbar-brand brand-logo" href="menu.html">Alke<span>Wallet</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item"><a class="nav-link" href="menu.html"><i class="bi bi-house me-1"></i>Inicio</a></li>
          <li class="nav-item"><a class="nav-link active" href="deposit.html"><i class="bi bi-cash-coin me-1"></i>Depositar</a></li>
          <li class="nav-item"><a class="nav-link" href="sendmoney.html"><i class="bi bi-send me-1"></i>Enviar</a></li>
          <li class="nav-item"><a class="nav-link" href="transactions.html"><i class="bi bi-clock-history me-1"></i>Movimientos</a></li>
          <li class="nav-item ms-lg-3">
            <button id="logoutBtn" class="btn btn-sm btn-outline-light"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-4 fade-in">
    <div class="row justify-content-center">
      <div class="col-lg-7">
        <!-- Saldo actual -->
        <div class="balance-card mb-4">
          <div class="label">Saldo disponible</div>
          <div class="amount" id="balanceAmount">$0</div>
        </div>

        <div class="card card-alke">
          <div class="card-body p-4">
            <!-- Pestañas Depósito / Retiro -->
            <ul class="nav nav-pills mb-4" id="opTabs">
              <li class="nav-item">
                <button class="nav-link active" data-op="deposit"><i class="bi bi-cash-coin me-1"></i>Depositar</button>
              </li>
              <li class="nav-item">
                <button class="nav-link" data-op="withdraw"><i class="bi bi-cash-stack me-1"></i>Retirar</button>
              </li>
            </ul>

            <div id="opAlert" class="alert d-none" role="alert"></div>

            <form id="depositForm" novalidate>
              <div class="mb-3">
                <label for="amount" class="form-label" id="amountLabel">Monto a depositar (CLP)</label>
                <div class="input-group input-group-lg">
                  <span class="input-group-text">$</span>
                  <input type="number" class="form-control" id="amount" min="1" step="1000" placeholder="0" required />
                </div>
                <div class="invalid-feedback">Ingresa un monto válido mayor a cero.</div>
              </div>

              <!-- Montos rápidos -->
              <div class="mb-3 d-flex flex-wrap gap-2">
                <button type="button" class="btn btn-sm btn-outline-secondary quick-amount" data-val="10000">+ $10.000</button>
                <button type="button" class="btn btn-sm btn-outline-secondary quick-amount" data-val="50000">+ $50.000</button>
                <button type="button" class="btn btn-sm btn-outline-secondary quick-amount" data-val="100000">+ $100.000</button>
              </div>

              <div class="mb-4">
                <label for="description" class="form-label">Descripción (opcional)</label>
                <input type="text" class="form-control" id="description" placeholder="Ej: Sueldo, ahorro…" maxlength="60" />
              </div>

              <button type="submit" class="btn btn-alke w-100 btn-lg" id="submitBtn">Realizar depósito</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="alke-footer text-center">
    Alke Wallet © 2026 · Proyecto educativo Módulo 2
  </footer>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/deposit.js"></script>
</body>
</html>
